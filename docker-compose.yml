services:
  app:
    # Pulls a pre-built, immutable image from your registry -- it does NOT
    # build from source on the VPS. CI builds it; the VPS only runs it.
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:?}/my-project:${IMAGE_TAG:-latest}
    container_name: my-project-app
    restart: unless-stopped

    # NO bind mount. NO source code exposed. NO agent CLI, SSH, or nvim --
    # none of that ships to production at all. The image is self-contained;
    # every dependency it needs was installed during the CI build.

    ports:
      - "3000:3000"

    # Secrets come from a .env file that lives ONLY on the VPS -- it is
    # never committed to git, never part of the image, and is deployed to
    # the server out-of-band (e.g. via your CI/CD secret store writing it
    # on first deploy, or a secrets manager).
    env_file:
      - .env

    # --- Hardening -------------------------------------------------------
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp

    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
