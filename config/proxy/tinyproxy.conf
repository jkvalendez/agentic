# Egress allowlist proxy config.
# Only requests to these domains are allowed out of the agent container.
# Everything else is refused -- this is the main defense against an agent
# (or a prompt-injected file/dependency) trying to exfiltrate data anywhere
# other than your chosen LLM provider.

Port 8888
Listen 0.0.0.0
Timeout 600
MaxClients 20

# Allow the internal docker network to use this proxy
Allow 172.16.0.0/12
Allow 192.168.0.0/16
Allow 10.0.0.0/8

# --- Domain allowlist -----------------------------------------------
# Add/remove lines depending on which provider(s) you use.
FilterDefaultDeny Yes
Filter "/etc/tinyproxy/allowed-domains.txt"
FilterURLs Yes
FilterExtended Yes
